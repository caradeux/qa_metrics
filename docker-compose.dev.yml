# Postgres local para desarrollo/pruebas de qa_metrics.
# Uso: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:16-alpine
    container_name: qa_metrics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qa_metrics
    ports:
      - "5432:5432"
    volumes:
      - qa_metrics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d qa_metrics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qa_metrics_pgdata:
